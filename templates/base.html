<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>{{ title }} | Akshat Sharma</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/theme-vars.css">
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/extended/highlight.css"> <!-- <- your dracula theme here -->
    <link rel="stylesheet" href="/static/extended/sidenotes.css">
    <link rel="stylesheet" href="/static/extended/bsky-comments.css">
    <script src="/static/bsky-comments.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--theme);
            color: var(--content);
            max-width: var(--main-width);
            margin: auto;
            padding: 2rem;
        }
    </style>
</head>

<body>
    <header>
        <h1><a href="/">Akshat Sharma</a></h1>
    </header>

    <article>
        <h2>{{ title }}</h2>
        <small>{{ date }}</small>
        <div>{{ tags }}</div>
        <section>
            {{ content }}
        </section>
    </article>

    <section>
        {{ comments }}
    </section>

    <footer>
        <p>© {{ year }} Akshat Sharma</p>
    </footer>
</body>

</html>
