{% extends "base.html" %}

{% block canonical_path %}/search/{% endblock %}

{% block main %}
<header class="page-header">
    <h1>Search</h1>
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="Search posts..." aria-label="search">
</div>
<ul id="searchResults" aria-label="search results"></ul>
{% endblock %}

{% block body_scripts %}
<link rel="preload" href="/index.json" as="fetch" crossorigin>
<script src="/js/fuse.basic.min.js"></script>
<script src="/js/search.js"></script>
{% endblock %}
