{% extends "base.html" %}

{% block canonical_path %}/tags/{% endblock %}

{% block main %}
<header class="page-header">
    <h1>Tags</h1>
</header>

<ul class="terms-tags">
    {% for tag in tags %}
    <li>
        <a href="/tags/{{ tag.Slug }}/">{{ tag.Name }} <span class="tag-count">{{ tag.Count }}</span></a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
